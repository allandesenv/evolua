server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://auth-service:8081
              predicates:
                - Path=/v1/auth/**,/v1/public/auth/**,/auth/google/callback
            - id: user-service
              uri: http://user-service:8082
              predicates:
                - Path=/v1/profiles/**
            - id: content-service
              uri: http://content-service:8083
              predicates:
                - Path=/v1/trails/**
            - id: emotional-service
              uri: http://emotional-service:8084
              predicates:
                - Path=/v1/check-ins/**
            - id: social-service
              uri: http://social-service:8085
              predicates:
                - Path=/v1/posts/**
            - id: chat-service
              uri: http://chat-service:8086
              predicates:
                - Path=/v1/messages/**,/ws/chat/**
            - id: subscription-service
              uri: http://subscription-service:8087
              predicates:
                - Path=/v1/subscriptions/**
            - id: notification-service
              uri: http://notification-service:8088
              predicates:
                - Path=/v1/notifications/**
springdoc:
  swagger-ui:
    path: /swagger-ui.html

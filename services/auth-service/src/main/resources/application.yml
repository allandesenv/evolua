server:
  port: ${SERVER_PORT:8081}
spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth}
    username: ${SPRING_DATASOURCE_USERNAME:evolua}
    password: ${SPRING_DATASOURCE_PASSWORD:evolua}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
springdoc:
  swagger-ui:
    path: /swagger-ui.html
app:
  seed:
    enabled: ${APP_SEED_ENABLED:false}
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  oauth:
    google:
      client-id: "${GOOGLE_CLIENT_ID:}"
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:}
      allowed-frontend-origin-patterns: ${GOOGLE_ALLOWED_FRONTEND_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:change-this-secret-before-production-change-this-secret}
  user-service:
    base-url: ${APP_USER_SERVICE_BASE_URL:http://user-service:8082}
  account:
    internal-token: ${APP_ACCOUNT_INTERNAL_TOKEN:change-me-internal-token}

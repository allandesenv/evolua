server:
  port: ${SERVER_PORT:8087}
spring:
  application:
    name: subscription-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/evolua}
    username: ${SPRING_DATASOURCE_USERNAME:evolua}
    password: ${SPRING_DATASOURCE_PASSWORD:evolua}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
springdoc:
  swagger-ui:
    path: /swagger-ui.html
app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:change-this-secret-before-production-change-this-secret}
  billing:
    provider: ${APP_BILLING_PROVIDER:mercadopago}
    frontend-base-url: ${APP_BILLING_FRONTEND_BASE_URL:http://localhost:3000}
    public-base-url: ${APP_BILLING_PUBLIC_BASE_URL:http://localhost:8087}
    internal-token: ${APP_BILLING_INTERNAL_TOKEN:change-me-internal-token}
    mercado-pago:
      base-url: ${MERCADO_PAGO_BASE_URL:https://api.mercadopago.com}
      access-token: ${MERCADO_PAGO_ACCESS_TOKEN:}
      webhook-secret: ${MERCADO_PAGO_WEBHOOK_SECRET:}
    admob:
      verifier-keys-url: ${ADMOB_VERIFIER_KEYS_URL:https://www.gstatic.com/admob/reward/verifier-keys.json}
      ssv-verification-enabled: ${ADMOB_SSV_VERIFICATION_ENABLED:true}
